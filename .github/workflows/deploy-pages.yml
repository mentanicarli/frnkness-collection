name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        env:
          VITE_SUPABASE_URL: https://momcakikuivtvxkmgjhx.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_ept_0dlTFn9cWLM0wIK2JA_a7xNSx-I
          VITE_SHOW_NEW_RELEASE_PROMO: 'true'
          VITE_NEW_RELEASE_PROMO_ID: faaa
        run: npm run build

      - name: Copy static media files
        run: |
          cp -r images dist/images
          cp -r audio dist/audio
          cp -r lyrics dist/lyrics
          cp -r lyrics-books dist/lyrics-books

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
